name: gonest-tools-ci

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: gonest-tools/go.work.sum

      - name: Test tools
        working-directory: gonest-tools
        run: make test

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool:
          - badge
          - clean
          - tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build ${{ matrix.tool }}
        working-directory: gonest-tools
        run: make build-${{ matrix.tool }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: gonest-tools
          args: --timeout=5m
